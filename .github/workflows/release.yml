name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # Two runners: jammy = older libstdc++ (22.04 users); noble = 24.04+ toolchains.
  package-deb:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-22.04, suffix: jammy }
          - { runner: ubuntu-24.04, suffix: noble }

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake pkg-config libfcitx5core-dev

      - name: Build .deb
        env:
          VNKEY_DEB_PACKAGE_SUFFIX: ${{ matrix.suffix }}
        run: bash scripts/build-deb.sh

      - uses: actions/upload-artifact@v4
        with:
          name: vnkey-fcitx5-deb-${{ matrix.suffix }}
          path: vnkey-fcitx/build-deb/*.deb

  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies (jammy .deb + host tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake pkg-config libfcitx5core-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
